<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0f172a"/>
  <title>Test Oluşturucu Pro - PDF Düzeltildi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    /* ── KISA STİLLER ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .btn {
      background: #334155;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover { background: #475569; }
    .btn-primary { background: #10b981; }
    .btn-primary:hover { background: #059669; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      margin-top: 16px;
      border: 1px solid #334155;
    }
    .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .status {
      padding: 10px 14px;
      border-radius: 8px;
      background: #0f172a;
      margin-top: 10px;
    }
    .status.error { color: #ef4444; border-left: 4px solid #ef4444; }
    .status.success { color: #10b981; border-left: 4px solid #10b981; }
    .status.info { color: #60a5fa; border-left: 4px solid #60a5fa; }
    #pdf-canvas-container canvas {
      width: 100% !important;
      height: auto !important;
      border: 1px solid #475569;
      border-radius: 8px;
      margin-bottom: 12px;
      background: white;
    }
    .text-layer span {
      color: transparent !important;
      user-select: text !important;
      cursor: text !important;
      pointer-events: auto !important;
    }
    .question-list {
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .question-item {
      background: #0f172a;
      padding: 8px 12px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid #10b981;
    }
  </style>
</head>
<body>

<div class="container">
  <h1 style="font-size:28px; font-weight:800; margin-bottom:4px;">📄 Test Oluşturucu Pro</h1>
  <p style="color:#94a3b8; margin-bottom:20px;">PDF'den metin seçerek soru ekleyin</p>

  <div class="card">
    <div class="flex">
      <input type="file" id="pdf-upload" accept=".pdf" style="flex:1; color:white; background:#0f172a; padding:8px; border-radius:6px; border:1px solid #475569;">
      <button class="btn btn-primary" onclick="loadPDF()">📤 Yükle</button>
      <button class="btn" onclick="clearAll()">🗑️ Temizle</button>
    </div>
    <div id="pdf-status" class="status info">⏳ PDF yüklenmedi.</div>
  </div>

  <div class="card" style="display:flex; flex-wrap:wrap; gap:20px;">
    <div style="flex:2; min-width:280px;">
      <h3 style="margin-bottom:8px;">📖 PDF Görünümü</h3>
      <div id="pdf-canvas-container" style="background:#f0f0f0; padding:12px; border-radius:12px; max-height:500px; overflow-y:auto;">
        <p style="color:#94a3b8; text-align:center; padding:40px 0;">PDF yükleyin</p>
      </div>
    </div>
    <div style="flex:1; min-width:200px;">
      <h3>✏️ Seçilen Metin</h3>
      <div id="selected-text" style="background:#0f172a; padding:12px; border-radius:8px; min-height:60px; border:1px solid #475569; color:#94a3b8; font-size:14px; word-wrap:break-word;">Metin seçin...</div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="btn btn-primary" style="flex:1;" onclick="addQuestion()">➕ Soru Ekle</button>
        <button class="btn" style="flex:1;" onclick="pasteText()">📋 Yapıştır</button>
      </div>
      <h4 style="margin-top:16px;">📋 Eklenen Sorular (<span id="q-count">0</span>)</h4>
      <div id="question-list" class="question-list">
        <div style="color:#94a3b8; font-size:13px;">Henüz soru yok.</div>
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:12px;" onclick="createTest()">📝 Test Oluştur</button>
    </div>
  </div>
</div>

<script>
// ── PDF.JS WORKER ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── DEĞİŞKENLER ──
let pdfDoc = null;
let selectedText = '';
let questions = [];

// ── PDF YÜKLE ──
async function loadPDF() {
  const fileInput = document.getElementById('pdf-upload');
  const status = document.getElementById('pdf-status');
  const file = fileInput.files[0];
  if (!file) {
    status.className = 'status error';
    status.textContent = '❌ Lütfen bir PDF dosyası seçin.';
    return;
  }

  status.className = 'status info';
  status.textContent = '⏳ PDF okunuyor...';

  try {
    const arrayBuffer = await file.arrayBuffer();
    const typedarray = new Uint8Array(arrayBuffer);

    // PDF belgesini yükle
    const loadingTask = pdfjsLib.getDocument({ data: typedarray });
    pdfDoc = await loadingTask.promise;

    if (!pdfDoc || !pdfDoc.numPages) {
      throw new Error('PDF geçersiz veya sayfa sayısı alınamadı.');
    }

    status.className = 'status success';
    status.textContent = `✅ PDF yüklendi (${pdfDoc.numPages} sayfa)`;

    await renderPages();
    status.textContent += ' ✅ Metin seçilebilir.';

  } catch (err) {
    console.error('PDF yükleme hatası:', err);
    status.className = 'status error';
    status.textContent = `❌ Hata: ${err.message}`;
    pdfDoc = null;
  }
}

// ── SAYFALARI RENDER ET ──
async function renderPages() {
  const container = document.getElementById('pdf-canvas-container');
  container.innerHTML = '';
  if (!pdfDoc) return;

  for (let i = 1; i <= pdfDoc.numPages; i++) {
    try {
      const page = await pdfDoc.getPage(i);
      const viewport = page.getViewport({ scale: 1.2 });

      // Canvas
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width = '100%';
      canvas.style.height = 'auto';
      canvas.style.border = '1px solid #475569';
      canvas.style.borderRadius = '8px';
      canvas.style.marginBottom = '12px';
      canvas.style.background = 'white';
      container.appendChild(canvas);

      await page.render({ canvasContext: context, viewport }).promise;

      // Metin katmanı
      const textContent = await page.getTextContent();
      if (textContent.items.length === 0) {
        const warn = document.createElement('div');
        warn.textContent = `⚠️ ${i}. sayfada metin yok (taranmış olabilir)`;
        warn.style.cssText = 'color:#f59e0b; font-size:12px; margin-top:-8px; margin-bottom:12px;';
        container.appendChild(warn);
        continue;
      }

      const textLayer = document.createElement('div');
      textLayer.style.position = 'relative';
      textLayer.style.width = '100%';
      textLayer.style.height = '0';
      textLayer.style.overflow = 'visible';
      textLayer.style.marginTop = '-' + canvas.height + 'px';
      textLayer.style.pointerEvents = 'none';

      const scale = 1.2;
      textContent.items.forEach(item => {
        const span = document.createElement('span');
        span.textContent = item.str;
        span.style.position = 'absolute';
        span.style.left = (item.transform[4] * scale) + 'px';
        span.style.top = (item.transform[5] * scale) + 'px';
        span.style.fontSize = (item.height * scale) + 'px';
        span.style.fontFamily = 'sans-serif';
        span.style.color = 'transparent';
        span.style.userSelect = 'text';
        span.style.cursor = 'text';
        span.style.pointerEvents = 'auto';
        span.style.display = 'inline-block';
        span.style.whiteSpace = 'pre';
        textLayer.appendChild(span);
      });

      container.appendChild(textLayer);

      // Seçim yakalama
      textLayer.addEventListener('mouseup', handleSelection);
      textLayer.addEventListener('touchend', () => setTimeout(handleSelection, 300));
    } catch (err) {
      console.error('Sayfa render hatası:', err);
      const errDiv = document.createElement('div');
      errDiv.textContent = `❌ ${i}. sayfa gösterilemedi: ${err.message}`;
      errDiv.style.cssText = 'color:#ef4444; padding:8px; background:#0f172a; border-radius:4px; margin-bottom:8px;';
      container.appendChild(errDiv);
    }
  }
}

// ── SEÇİM YAKALAMA ──
function handleSelection() {
  const sel = window.getSelection().toString().trim();
  if (sel) {
    selectedText = sel;
    document.getElementById('selected-text').textContent = sel;
    document.getElementById('selected-text').style.color = '#f8fafc';
  }
}

// ── SORU EKLE ──
function addQuestion() {
  if (!selectedText) {
    alert('Lütfen önce bir metin seçin veya yapıştırın.');
    return;
  }
  questions.push(selectedText);
  updateQuestionList();
  selectedText = '';
  document.getElementById('selected-text').textContent = 'Metin seçin...';
  document.getElementById('selected-text').style.color = '#94a3b8';
  window.getSelection().removeAllRanges();
}

// ── YAPIŞTIR ──
async function pasteText() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) {
      selectedText = text;
      document.getElementById('selected-text').textContent = text;
      document.getElementById('selected-text').style.color = '#f8fafc';
    }
  } catch {
    const manual = prompt('Metni buraya yapıştırın:');
    if (manual) {
      selectedText = manual;
      document.getElementById('selected-text').textContent = manual;
      document.getElementById('selected-text').style.color = '#f8fafc';
    }
  }
}

// ── SORU LİSTESİNİ GÜNCELLE ──
function updateQuestionList() {
  const container = document.getElementById('question-list');
  const count = document.getElementById('q-count');
  count.textContent = questions.length;
  if (questions.length === 0) {
    container.innerHTML = '<div style="color:#94a3b8; font-size:13px;">Henüz soru yok.</div>';
    return;
  }
  container.innerHTML = questions.map((q, i) => `
    <div class="question-item">
      <span style="font-size:13px; word-break:break-word;">${q.substring(0, 80)}${q.length > 80 ? '...' : ''}</span>
      <button onclick="removeQuestion(${i})" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:16px;">✕</button>
    </div>
  `).join('');
}

function removeQuestion(index) {
  questions.splice(index, 1);
  updateQuestionList();
}

// ── TEST OLUŞTUR ──
function createTest() {
  if (questions.length === 0) {
    alert('Hiç soru eklenmemiş.');
    return;
  }
  const title = prompt('Test başlığı:', 'PDF\'den Alınan Test');
  if (!title) return;
  const cls = prompt('Sınıf:', '');
  // Testi localStorage'a kaydet (basitçe)
  const test = {
    id: 't' + Date.now() + Math.random().toString(36).substring(2,6),
    title: title,
    class: cls || 'Sınıf yok',
    questions: questions.length,
    status: 'ready',
    date: new Date().toLocaleDateString('tr-TR'),
    questionsList: [...questions]
  };
  let tests = JSON.parse(localStorage.getItem('testAppData')) || [];
  tests.unshift(test);
  localStorage.setItem('testAppData', JSON.stringify(tests));
  alert(`✅ "${title}" testi ${questions.length} soru ile oluşturuldu!`);
  questions = [];
  updateQuestionList();
}

// ── TEMİZLE ──
function clearAll() {
  document.getElementById('pdf-upload').value = '';
  document.getElementById('pdf-canvas-container').innerHTML = '<p style="color:#94a3b8; text-align:center; padding:40px 0;">PDF yükleyin</p>';
  document.getElementById('pdf-status').className = 'status info';
  document.getElementById('pdf-status').textContent = '⏳ PDF yüklenmedi.';
  pdfDoc = null;
  selectedText = '';
  questions = [];
  updateQuestionList();
  document.getElementById('selected-text').textContent = 'Metin seçin...';
  document.getElementById('selected-text').style.color = '#94a3b8';
}
</script>

</body>
</html>
